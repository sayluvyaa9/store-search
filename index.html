<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ค้นหาร้านค้า</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ✅ Google Font Sarabun -->
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body {
  font-family: 'Sarabun', sans-serif;
  background: #f2f7fb;
  margin: 0;
  padding: 0;
  color: #2c3e50;
  line-height: 1.6;
}

.banner {
  position: relative;   /* 👈 เพิ่มตรงนี้ */
  height: 180px;
  background: linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)),
              url('banner.jpg.png') center/cover no-repeat;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: white;
  text-align: center;
  font-size: 22px;
  font-weight: 600;
  padding: 0 20px;
  border-radius: 0 0 25px 25px;
}

/* ชั้น overlay โทนเย็น */
.banner::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    rgba(120, 170, 200, 0.55),
    rgba(90, 130, 170, 0.55)
  );
}

/* ตัวหนังสือบนแบนเนอร์ */
.banner-text {
  position: relative;
  color: white;
  font-size: 28px;
  font-weight: 600;
  text-shadow: 0 3px 10px rgba(0,0,0,0.4);
}

/* ===== กล่องเนื้อหา ===== */
.container {
  padding: 20px;
  max-width: 900px;
  margin: auto;
}

/* ===== input & select ===== */
input, select {
  padding: 12px 14px;
  margin: 10px 0;
  width: 100%;
  border-radius: 12px;
  border: 1px solid #dde6ef;
  font-size: 15px;
  background: #f9fbfd;
  transition: 0.2s;
}

input:focus, select:focus {
  outline: none;
  border-color: #4da6ff;
  background: white;
  box-shadow: 0 0 0 3px rgba(77,166,255,0.15);
}
  
/* ===== รายการร้าน ===== */
.store-item {
  background: white;
  padding: 18px;
  margin-bottom: 14px;
  border-radius: 18px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.06);
  cursor: pointer;
  transition: 0.25s;
}

.store-item:hover {
  transform: translateY(-3px);
}

/* ===== badge แอดมิน ===== */
.admin-badge {
  background: #ffb3c6;
  color: white;
  padding: 3px 8px;
  border-radius: 20px;
  font-size: 12px;
  margin-left: 8px;
}

/* ===== tag บริการ ===== */
.service-tag {
  display: inline-block;
  padding: 4px 10px;
  margin: 4px 4px 0 0;
  border-radius: 20px;
  font-size: 13px;
  background: #d6ecff;
  color: #2c3e50;
}

/* ===== กล่องรายละเอียด ===== */
#storeDetail {
  background: white;
  padding: 20px;
  border-radius: 15px;
  margin-top: 25px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

/* ===== Responsive ===== */
@media (max-width: 600px) {

  .banner {
    height: 160px;
    font-size: 20px;
  }

  .container {
    padding: 15px;
  }

  h2 {
    font-size: 18px;
  }

}
  /* ===== การ์ดกล่องค้นหา ===== */
.search-card {
  background: white;
  padding: 18px;
  border-radius: 18px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.06);
  margin-top: -40px;
}

  .watermark {
  text-align: center;
  padding: 30px 10px;
  font-size: 13px;
  color: rgba(0,0,0,0.5);
  letter-spacing: 1px;
}
  
</style>
</head>

<body>

<header class="banner">
  <div class="banner-text">
    ศูนย์รวมร้านค้าในเครือ HNTG
  </div>
</header>

<div class="container">

<div class="search-card">

<h2 style="margin-top:0;">ค้นหาร้านค้า</h2>

<input type="text" id="searchBox" placeholder="🔎 พิมพ์ชื่อร้าน หรือ รหัสร้าน">

<select id="serviceFilter">
  <option value="">-- เลือกบริการ --</option>
  <option value="เติมเกม">เติมเกม</option>
  <option value="ปล่อยเช่าไอดี">ปล่อยเช่าไอดี</option>
  <option value="กลางไอดีเกม">กลางไอดีเกม</option>
</select>

</div> <!-- ปิด search-card -->
<div id="storeList" style="margin-top:20px;"></div>
<div id="storeDetail"></div>

</div>
  
<footer class="watermark">
  © <span id="year"></span> HNTG House of Nightingale
</footer>
  
<script>

let stores = [];

async function loadData() {
  const response = await fetch("https://opensheet.elk.sh/1ROyD2HCOnIO8dwlZLLKGfJkZVvFg2vRsG6GYr2Mdcxw/Sheet1");
  stores = await response.json();
  filterStores();
}

loadData();

function filterStores() {
  const selectedService = document.getElementById("serviceFilter").value;
  const searchText = document.getElementById("searchBox").value.toLowerCase();
  const listDiv = document.getElementById("storeList");
  const detailDiv = document.getElementById("storeDetail");

  detailDiv.innerHTML = "";

  let filtered = stores;

  if (selectedService) {
    filtered = filtered.filter(store => {
      if (!store.service) return false;
      const services = store.service.split(",").map(s => s.trim());

      if (selectedService === "กลางไอดีเกม") {
        return services.includes(selectedService) && store.is_admin === "TRUE";
      }

      return services.includes(selectedService);
    });
  }

  if (searchText) {
    filtered = filtered.filter(store =>
      (store.name || "").toLowerCase().includes(searchText) ||
      (store.Idvmarket || "").toLowerCase().includes(searchText)
    );
  }

  // ⭐ แอดมินขึ้นบนสุดเสมอ
  filtered.sort((a, b) => {
    if (a.is_admin === "TRUE" && b.is_admin !== "TRUE") return -1;
    if (a.is_admin !== "TRUE" && b.is_admin === "TRUE") return 1;
    return 0;
  });

  if (filtered.length === 0) {
    listDiv.innerHTML = "ไม่พบร้านค้า";
    return;
  }

  listDiv.innerHTML = filtered.map(store => `
    <div class="store-item" onclick="showDetail('${store.Idvmarket}')">
      <strong>${store.name}</strong>
      ${store.is_admin === "TRUE" 
        ? '<span class="admin-badge">👑 แอดมินกลุ่ม</span>' 
        : ''}
    </div>
  `).join("");
}

function showDetail(id) {
  const store = stores.find(s => s.Idvmarket === id);
  if (!store) return;

  const services = store.service
    ? store.service.split(",").map(s => 
        `<span class="service-tag">${s.trim()}</span>`
      ).join("")
    : "ไม่มีข้อมูล";

  document.getElementById("storeDetail").innerHTML = `
    <h3>${store.name}
      ${store.is_admin === "TRUE" 
        ? '<span class="admin-badge">👑 แอดมินกลุ่ม</span>' 
        : ''}
    </h3>
    <p><strong>รหัสร้าน:</strong> ${store.Idvmarket}</p>
    <p><strong>บริการ:</strong><br>${services}</p>
    <p><strong>บัญชีธนาคาร:</strong> ${store.bank_account}</p>
    <p><a href="${store.facebook}" target="_blank">ไปยัง Facebook ร้าน</a></p>
  `;
}

document.getElementById("serviceFilter").addEventListener("change", filterStores);
document.getElementById("searchBox").addEventListener("input", filterStores);

document.getElementById("year").textContent = new Date().getFullYear();
  
</script>
  
</body>
</html>
