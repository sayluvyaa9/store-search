<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ค้นหาร้านค้า</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial; padding:20px; }
input, select { padding:8px; margin:5px 0; width:250px; }
.store-item {
  padding:10px;
  border-bottom:1px solid #ccc;
  cursor:pointer;
}
.store-item:hover {
  background:#f0f0f0;
}
</style>
</head>
<body>

<h2>ค้นหาร้านค้า</h2>

<!-- ช่องค้นหา -->
<input type="text" id="searchBox" placeholder="พิมพ์ชื่อร้าน หรือ รหัสร้าน">

<br>

<select id="serviceFilter">
  <option value="">-- เลือกบริการ --</option>
  <option value="เติมเกม">เติมเกม</option>
  <option value="ปล่อยเช่าไอดี">ปล่อยเช่าไอดี</option>
</select>

<div id="storeList" style="margin-top:20px;"></div>
<div id="storeDetail" style="margin-top:30px;"></div>

<script>
let stores = [];

async function loadData() {
  const response = await fetch("https://opensheet.elk.sh/1ROyD2HCOnIO8dwlZLLKGfJkZVvFg2vRsG6GYr2Mdcxw/Sheet1");
  stores = await response.json();
  console.log(stores); // ใช้เช็คชื่อคอลัมน์
}

loadData();

function filterStores() {
  const selectedService = document.getElementById("serviceFilter").value;
  const searchText = document.getElementById("searchBox").value.toLowerCase();
  const listDiv = document.getElementById("storeList");
  const detailDiv = document.getElementById("storeDetail");

  detailDiv.innerHTML = "";

  let filtered = stores;

  // กรองตามบริการ
  if (selectedService) {
    filtered = filtered.filter(store =>
      (store.service || "").includes(selectedService)
    );
  }

  // กรองตามชื่อร้าน หรือ Idvmarket
  if (searchText) {
    filtered = filtered.filter(store =>
      (store.name || "").toLowerCase().includes(searchText) ||
      (store.Idvmarket || "").toLowerCase().includes(searchText)
    );
  }

  if (filtered.length === 0) {
    listDiv.innerHTML = "ไม่พบร้านค้า";
    return;
  }

  listDiv.innerHTML = filtered.map(store => `
    <div class="store-item" onclick="showDetail('${store.Idvmarket}')">
      ${store.name}
    </div>
  `).join("");
}

function showDetail(id) {
  const store = stores.find(s => s.Idvmarket === id);

  if (!store) return;

  document.getElementById("storeDetail").innerHTML = `
    <h3>${store.name}</h3>
    <p><strong>รหัสร้าน:</strong> ${store.Idvmarket}</p>
    <p><strong>บริการ:</strong> ${store.service}</p>
    <p><strong>บัญชีธนาคาร:</strong> ${store.bank_account}</p>
    <p><a href="${store.facebook}" target="_blank">ไปยัง Facebook ร้าน</a></p>
  `;
}

document.getElementById("serviceFilter").addEventListener("change", filterStores);
document.getElementById("searchBox").addEventListener("input", filterStores);

</script>

</body>
</html>
