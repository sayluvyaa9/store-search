<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ค้นหาร้านค้า</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Sarabun',sans-serif;
background:#f2f7fb;
margin:0;
color:#2c3e50;
}

.banner{
height:180px;
background:linear-gradient(rgba(0,0,0,0.45),rgba(0,0,0,0.45)),url('banner.jpg.png') center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
color:white;
border-radius:0 0 25px 25px;
}

.banner-text{
font-size:28px;
font-weight:600;
}

.container{
padding:20px;
max-width:900px;
margin:auto;
}

.search-card{
background:white;
padding:18px;
border-radius:18px;
box-shadow:0 6px 18px rgba(0,0,0,0.06);
margin-top:20px;
}

input,select{
padding:12px;
margin:10px 0;
width:100%;
border-radius:12px;
border:1px solid #dde6ef;
font-size:15px;
background:#f9fbfd;
box-sizing: border-box;
}

.store-item{
background:white;
padding:18px;
margin-bottom:14px;
border-radius:18px;
box-shadow:0 8px 20px rgba(0,0,0,0.06);
cursor:pointer;
transition:.25s;
}

.store-item:hover{
transform:translateY(-3px);
}

.admin-badge{
background:#ffb3c6;
color:white;
padding:3px 8px;
border-radius:20px;
font-size:12px;
margin-left:8px;
}

.service-tag{
display:inline-block;
padding:4px 10px;
margin:4px;
border-radius:20px;
font-size:13px;
background:#d6ecff;
}

.store-detail{
overflow:hidden;
height:0;
transition:height .35s cubic-bezier(.4,0,.2,1);
}

.store-detail-box{
background:white;
padding:18px;
margin-bottom:14px;
border-radius:18px;
box-shadow:0 6px 18px rgba(0,0,0,0.06);
}

.watermark{
text-align:center;
padding:30px;
font-size:13px;
color:rgba(0,0,0,0.5);
}

</style>
</head>

<body>

<header class="banner">
<div class="banner-text">
ศูนย์รวมร้านค้าในเครือ HNTG
</div>
</header>

<div class="container">

<div class="search-card">

<h2>ค้นหาร้านค้า</h2>

<input type="text" id="searchBox" placeholder="🔎 พิมพ์ชื่อร้าน หรือ รหัสร้าน">

<select id="serviceFilter">
<option value="">-- เลือกบริการ --</option>
</select>

</div>

<div id="storeList" style="margin-top:20px;"></div>

</div>

<footer class="watermark">
© <span id="year"></span> HNTG House Of Nightingale
</footer>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCUUyUmyEuhgw60k4y0gSNFV1e7xrp65mk",
authDomain: "hntg-c8abd.firebaseapp.com",
projectId: "hntg-c8abd",
storageBucket: "hntg-c8abd.firebasestorage.app",
messagingSenderId: "496749945361",
appId: "1:496749945361:web:ca14759419e6eb574787b0"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let stores=[];

async function loadData(){

try{

const querySnapshot = await getDocs(collection(db,"stores"));

stores = querySnapshot.docs.map(doc => ({
id: doc.id,
...doc.data()
}));

console.log("โหลดร้านจาก Firebase:",stores);

createServiceOptions();
filterStores();

}catch(error){

console.error("โหลดร้านไม่สำเร็จ:",error);

document.getElementById("storeList").innerHTML =
"❌ โหลดข้อมูลร้านจาก Firebase ไม่ได้";

}

}

function createServiceOptions(){

const serviceFilter=document.getElementById("serviceFilter");

serviceFilter.innerHTML='<option value="">-- เลือกบริการ --</option>';

const allServices=stores
.filter(store=>store.service)
.flatMap(store=>store.service.split(","))
.map(s=>s.trim());

const uniqueServices=[...new Set(allServices)].sort((a,b)=>
a.localeCompare(b,"th",{sensitivity:"base"})
);

uniqueServices.forEach(service=>{
const option=document.createElement("option");
option.value=service;
option.textContent=service;
serviceFilter.appendChild(option);
});

}

function filterStores(){

const selectedService=document.getElementById("serviceFilter").value;
const searchText=document.getElementById("searchBox").value.toLowerCase();
const listDiv=document.getElementById("storeList");

let filtered=[...stores];

if(selectedService){

filtered=filtered.filter(store=>{

if(!store.service) return false;

const services=store.service.split(",").map(s=>s.trim());

return services.includes(selectedService);

});

}

if(searchText){

filtered=filtered.filter(store=>

(store.name||"").toLowerCase().includes(searchText) ||
(store.Idvmarket||"").toLowerCase().includes(searchText)

);

}

filtered.sort((a,b)=>{

const levelA=parseInt(a.admin_level)||0;
const levelB=parseInt(b.admin_level)||0;

if(levelA!==levelB){
return levelB-levelA;
}

return (a.name||"").localeCompare(b.name||"","th");

});

if(filtered.length===0){
listDiv.innerHTML="ไม่พบร้านค้า";
return;
}

listDiv.innerHTML=filtered.map(store=>`

<div class="store-item" onclick="showDetail(this,'${store.Idvmarket || store.id}')">

<strong>${store.name || "ไม่มีชื่อร้าน"}</strong>

${(parseInt(store.admin_level)||0)>0
?'<span class="admin-badge">👑 แอดมินกลุ่ม</span>'
:''}

</div>

`).join("");

}

window.showDetail=function(item,id){

const store=stores.find(s=>(s.Idvmarket||s.id)===id);
if(!store) return;

let detail=item.nextElementSibling;

if(!detail||!detail.classList.contains("store-detail")){

const services=store.service
?store.service.split(",").map(s=>`<span class="service-tag">${s.trim()}</span>`).join("")
:"ไม่มีข้อมูล";

detail=document.createElement("div");
detail.className="store-detail";

detail.innerHTML=`

<div class="store-detail-box">

<h3>${store.name || "-"}

${(parseInt(store.admin_level)||0)>0
?'<span class="admin-badge">👑 แอดมินกลุ่ม</span>'
:''}

</h3>

<p><strong>รหัสร้าน:</strong> ${store.Idvmarket || store.id}</p>

<p><strong>บริการ:</strong><br>${services}</p>

<p><strong>บัญชีธนาคาร:</strong> ${store.bank_account || "-"}</p>

<p>

<a href="${store.facebook || '#'}" target="_blank">

ไปยัง Facebook ร้าน

</a>

</p>

</div>

`;

item.after(detail);

}

const isOpen=detail.style.height && detail.style.height!=="0px";

document.querySelectorAll(".store-detail").forEach(el=>{
el.style.height="0px";
});

if(!isOpen){
detail.style.height=detail.scrollHeight+"px";
}

}

document.getElementById("serviceFilter").addEventListener("change",filterStores);
document.getElementById("searchBox").addEventListener("input",filterStores);

document.getElementById("year").textContent=new Date().getFullYear();

loadData();

</script>

</body>
</html>
