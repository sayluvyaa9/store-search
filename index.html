<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>ค้นหาร้านค้า</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="font-family: Arial; padding:20px;">

<h2>ค้นหาร้านจากบริการ</h2>

<select id="serviceFilter">
  <option value="">-- เลือกบริการ --</option>
  <option value="เติมเกม">เติมเกม</option>
  <option value="ปล่อยเช่าไอดี">ปล่อยเช่าไอดี</option>
</select>

<div id="storeList" style="margin-top:20px;"></div>

<div id="storeDetail" style="margin-top:30px;"></div>

<script>
let stores = [];

async function loadData() {
  const response = await fetch("https://opensheet.elk.sh/1ROyD2HCOnIO8dwlZLLKGfJkZVvFg2vRsG6GYr2Mdcxw/Sheet1");
  stores = await response.json();
}

loadData();

document.getElementById("serviceFilter").addEventListener("change", function() {
  const selected = this.value;
  const listDiv = document.getElementById("storeList");
  const detailDiv = document.getElementById("storeDetail");

  detailDiv.innerHTML = "";

  if (!selected) {
    listDiv.innerHTML = "";
    return;
  }

  const filtered = stores.filter(store =>
    store.service.includes(selected)
  );

  listDiv.innerHTML = filtered.map(store => `
    <div style="padding:10px; border-bottom:1px solid #ccc; cursor:pointer;"
         onclick="showDetail('${store.store_id}')">
      ${store.name}
    </div>
  `).join("");
});

function showDetail(id) {
  const store = stores.find(s => s.store_id === id);

  document.getElementById("storeDetail").innerHTML = `
    <h3>${store.name}</h3>
    <p>รหัสร้าน: ${store.store_id}</p>
    <p>บริการ: ${store.service}</p>
    <p>ชื่อบัญชี: ${store.account_name}</p>
    <a href="${store.facebook}" target="_blank">ไปยัง Facebook ร้าน</a>
  `;
}
</script>

</body>
</html>
