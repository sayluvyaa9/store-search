<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ค้นหาร้านค้า</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Sarabun', sans-serif;
  background: #f2f7fb;
  margin: 0;
  padding: 0;
  color: #2c3e50;
  line-height: 1.6;
}

.banner {
  position: relative;
  height: 180px;
  background: linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)),
              url('banner.jpg.png') center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  text-align: center;
  border-radius: 0 0 25px 25px;
}

.banner::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    rgba(120,170,200,0.55),
    rgba(90,130,170,0.55)
  );
}

.banner-text {
  position: relative;
  font-size: 28px;
  font-weight: 600;
  text-shadow: 0 3px 10px rgba(0,0,0,0.4);
}

.container {
  padding: 20px;
  max-width: 900px;
  margin: auto;
}

.search-card {
  background: white;
  padding: 18px;
  border-radius: 18px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.06);
  margin-top: 20px;
}

input, select {
  padding: 12px 14px;
  margin: 10px 0;
  width: 100%;
  border-radius: 12px;
  border: 1px solid #dde6ef;
  font-size: 15px;
  background: #f9fbfd;
  box-sizing: border-box;
}

.store-item {
  background: white;
  padding: 18px;
  margin-bottom: 14px;
  border-radius: 18px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.06);
  cursor: pointer;
  transition: 0.25s;
}

.store-item:hover {
  transform: translateY(-3px);
}

.admin-badge {
  background: #ffb3c6;
  color: white;
  padding: 3px 8px;
  border-radius: 20px;
  font-size: 12px;
  margin-left: 8px;
}

.service-tag {
  display: inline-block;
  padding: 4px 10px;
  margin: 4px 4px 0 0;
  border-radius: 20px;
  font-size: 13px;
  background: #d6ecff;
}

#storeDetail {
  background: white;
  padding: 20px;
  border-radius: 15px;
  margin-top: 25px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

.watermark {
  text-align: center;
  padding: 30px 10px;
  font-size: 13px;
  color: rgba(0,0,0,0.5);
}

  .store-detail{
  overflow:hidden;
  max-height:0;
  transition:max-height 0.35s ease;
}

.store-detail{
  overflow:hidden;
  max-height:0;
  transition:max-height 0.35s ease;
}
  
.store-detail-box{
  background:white;
  padding:18px;
  margin-bottom:14px;
  border-radius:18px;
  box-shadow:0 6px 18px rgba(0,0,0,0.06);
}
  
</style>
</head>

<body>

<header class="banner">
  <div class="banner-text">
    ศูนย์รวมร้านค้าในเครือ HNTG
  </div>
</header>

<div class="container">

<div class="search-card">
<h2 style="margin-top:0;">ค้นหาร้านค้า</h2>

<input type="text" id="searchBox" placeholder="🔎 พิมพ์ชื่อร้าน หรือ รหัสร้าน">

<select id="serviceFilter">
  <option value="">-- เลือกบริการ --</option>
</select>

</div>

<div id="storeList" style="margin-top:20px;"></div>

</div>

<footer class="watermark">
  © <span id="year"></span> HNTG House Of Nightingale
</footer>

<script>

let stores = [];

async function loadData() {
  const response = await fetch("https://opensheet.elk.sh/1ROyD2HCOnIO8dwlZLLKGfJkZVvFg2vRsG6GYr2Mdcxw/Sheet1");
  stores = await response.json();

  createServiceOptions();
  filterStores();
}

function createServiceOptions() {
  const serviceFilter = document.getElementById("serviceFilter");

  const allServices = stores
    .filter(store => store.service)
    .flatMap(store => store.service.split(","))
    .map(s => s.trim());

  const uniqueServices = [...new Set(allServices)].sort((a, b) =>
    a.localeCompare(b, "th", { sensitivity: "base" })
  );

  uniqueServices.forEach(service => {
    const option = document.createElement("option");
    option.value = service;
    option.textContent = service;
    serviceFilter.appendChild(option);
  });
}

function filterStores() {
  const selectedService = document.getElementById("serviceFilter").value;
  const searchText = document.getElementById("searchBox").value.toLowerCase();
  const listDiv = document.getElementById("storeList");
  
  let filtered = stores;

  if (selectedService) {
    filtered = filtered.filter(store => {
      if (!store.service) return false;
      const services = store.service.split(",").map(s => s.trim());

      if (selectedService === "กลางไอดีเกม") {
        return services.includes(selectedService) &&
               (parseInt(store.admin_level) || 0) > 0;
      }

      return services.includes(selectedService);
    });
  }

  if (searchText) {
    filtered = filtered.filter(store =>
      (store.name || "").toLowerCase().includes(searchText) ||
      (store.Idvmarket || "").toLowerCase().includes(searchText)
    );
  }

  filtered.sort((a, b) => {
    const levelA = parseInt(a.admin_level) || 0;
    const levelB = parseInt(b.admin_level) || 0;

    if (levelA !== levelB) {
      return levelB - levelA;
    }

    return (a.name || "").localeCompare(b.name || "", "th", {
      sensitivity: "base"
    });
  });

  if (filtered.length === 0) {
    listDiv.innerHTML = "ไม่พบร้านค้าดังกล่าว";
    return;
  }

 listDiv.innerHTML = filtered.map(store => `
  <div class="store-item" onclick="showDetail(this,'${store.Idvmarket}')">
    <strong>${store.name}</strong>
    ${(parseInt(store.admin_level) || 0) > 0
      ? '<span class="admin-badge">👑 แอดมินกลุ่ม</span>'
      : ''}
  </div>
`).join("");
}

function showDetail(item, id) {

  const store = stores.find(s => s.Idvmarket === id);
  if (!store) return;

  let detail = item.nextElementSibling;
  
  if (!detail || !detail.classList.contains("store-detail")) {

    const services = store.service
      ? store.service.split(",").map(s =>
          `<span class="service-tag">${s.trim()}</span>`
        ).join("")
      : "ไม่มีข้อมูล";

    detail = document.createElement("div");
    detail.className = "store-detail";

    detail.innerHTML = `
      <div class="store-detail-box">

        <h3>${store.name}
        ${(parseInt(store.admin_level) || 0) > 0
          ? '<span class="admin-badge">👑 แอดมินกลุ่ม</span>'
          : ''}
        </h3>

        <p><strong>รหัสร้าน:</strong> ${store.Idvmarket}</p>

        <p><strong>บริการ:</strong><br>${services}</p>

        <p><strong>บัญชีธนาคาร:</strong> ${store.bank_account || "-"}</p>

        <p>
          <a href="${store.facebook}" target="_blank">
          ไปยัง Facebook ร้าน
          </a>
        </p>

      </div>
    `;

    item.after(detail);
  }

  document.querySelectorAll(".store-detail").forEach(el=>{
  if(el !== detail){
    el.style.maxHeight = null;
  }
});

if (detail.style.maxHeight) {
  detail.style.maxHeight = null;
} else {
  detail.style.maxHeight = detail.scrollHeight + "px";
}

 item.scrollIntoView({
  behavior: "smooth",
  block: "center"
});
}

document.getElementById("serviceFilter").addEventListener("change", filterStores);
document.getElementById("searchBox").addEventListener("input", filterStores);
document.getElementById("year").textContent = new Date().getFullYear();

loadData();

</script>

</body>
</html>
